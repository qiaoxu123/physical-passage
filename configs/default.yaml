# Physical Passage — MVP configuration (all key parameters live here)

actions:
  trans_step: 0.05        # meters per translation action
  rot_step_deg: 5.0       # degrees per rotation action
  max_steps: 240

workspace:                # axis convention: passage along +y, up = +z
  bounds_min: [-0.7, -0.9, 0.05]
  bounds_max: [0.7, 0.9, 1.25]

wall:
  x_half: 0.7             # wall spans x in [-x_half, x_half]
  z_min: 0.0
  z_max: 1.3

render:
  main_size: 448          # main third-person perspective view (model input)
  aux_size: 256           # front/side/top label views (never fed to the model)
  main_cam:               # fixed oblique third-person camera
    target: [0.0, 0.0, 0.55]
    distance: 2.1
    yaw: 50.0             # degrees around z
    pitch: -35.0          # 30-45 degrees downward look
    fov: 60.0

collision:
  ccd_substeps: 8         # swept-volume interpolation steps per action
  touch_eps: 0.0001       # clearance below this counts as touching

generator:                # class mix (MVP)
  frac_easy: 0.30
  frac_rotation: 0.50
  frac_impossible: 0.20
  clearance_min: 0.03     # constructed margin between object and hole edge
  clearance_max: 0.08

reward:
  success: 100.0
  correct_impossible: 80.0
  collision: -100.0
  wrong_impossible: -50.0
  progress: 0.5           # per meter of forward progress toward/through hole
  step: -0.01
  out_of_bounds: -100.0
